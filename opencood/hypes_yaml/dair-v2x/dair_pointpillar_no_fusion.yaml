name: dair_pointpillar_no_fusion

data_dir: "/data2/collaborative_perception/data/dair_v2x/cooperative-vehicle-infrastructure"
root_dir: "/data2/collaborative_perception/data/dair_v2x/cooperative-vehicle-infrastructure/train.json"
validate_dir: "/data2/collaborative_perception/data/dair_v2x/cooperative-vehicle-infrastructure/val.json"
test_dir: "/data2/collaborative_perception/data/dair_v2x/cooperative-vehicle-infrastructure/val.json"

only_vis_ego: true

yaml_parser: "load_point_pillar_params"

train_params:
  batch_size: 2
  epoches: 30
  eval_freq: 2
  save_freq: 2

fusion:
  core_method: 'LateFusionDatasetDAIR'
  args:
    proj_first: false
    clip_pc: false

preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  cav_lidar_range: &cav_lidar [-100.8, -40, -3, 100.8, 40, 1]

postprocess:
  core_method: 'VoxelPostprocessor'
  gt_range: *cav_lidar
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 4.5
    w: 2
    h: 1.56
    r: [0, 90]
    feature_stride: 2
    num: &achor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.2
  order: 'hwl'
  max_num: 100
  nms_thresh: 0.15

model:
  core_method: point_pillar
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_num: *achor_num

    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]

    point_pillar_scatter:
      num_features: 64

    base_bev_backbone:
      layer_nums: [3, 4, 5]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 0.002
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size: [10, 20]

noise_setting:
  add_noise: False
  args:
    pos_std: 0.2
    rot_std: 0.2
    pos_mean: 0
    rot_mean: 0

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: ['x']

  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [0.95, 1.05]